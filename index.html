<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #faf6f1; }
      /* Smooth transitions for dashboard charts */
      .dash-animate { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
      .dash-fade { animation: dashFade 0.35s ease-out; }
      @keyframes dashFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      /* Bar animation */
      .bar-grow { animation: barGrow 0.5s ease-out; transform-origin: left; }
      @keyframes barGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      /* Donut animation */
      .donut-anim { animation: donutDraw 0.8s ease-out; }
      @keyframes donutDraw { from { stroke-dasharray: 0 999; } }
      /* Number counter feel */
      .num-pop { animation: numPop 0.3s ease-out; }
      @keyframes numPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
